# Remote tmux configuration
# Intended for headless/remote hosts (e.g. Raspberry Pi).
#
# Install:
#   scp ~/.etc/etc/tmux/tmux.remote.conf <host>:.tmux.conf
#
# Or symlink from a clone:
#   ln -sf ~/.etc/etc/tmux/tmux.remote.conf ~/.tmux.conf

# Terminal
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal tmux-256color' \
  'set -g default-terminal screen-256color'
set -ga terminal-overrides ",*:Tc"
set -sa terminal-features ',*:RGB'

# Use ctrl-a as prefix (avoid collision with local C-f)
set -g prefix C-a
bind C-a send-prefix

# Minimal status bar with distinct color
set -g status-style 'bg=colour24 fg=white'
set -g status-left ' '
set -g status-right ' #H %H:%M '

# Mouse
set -g mouse on
unbind -n MouseDown1Pane

# Responsiveness (nvim friendly)
set -sg escape-time 10
set -g focus-event on

# Vi keys
setw -g mode-keys vi

# Easy config reload
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

## Pane management ##

# Movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind C-h resize-pane -L 10
bind C-j resize-pane -D 5
bind C-k resize-pane -U 5
bind C-l resize-pane -R 10

# Split
bind o split-window -h -c "#{pane_current_path}"
bind O split-window -v -c "#{pane_current_path}"

# Open window
bind C-o new-window -c "#{pane_current_path}"

bind q kill-pane

# Copy mode
bind y copy-mode
bind p paste-buffer -p
