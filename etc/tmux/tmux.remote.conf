# Remote tmux overrides
# Intended for headless/remote hosts (e.g. Raspberry Pi).
#
# Install on the remote host:
#   cp ~/.etc/etc/tmux/tmux.remote.conf ~/.etc/local/tmux.conf

# Switch prefix to ctrl-a (avoid collision with local C-f)
unbind C-f
set -g prefix C-a
bind C-a send-prefix

# Minimal status bar with distinct color
set -g status-style 'bg=colour24 fg=white'
set -g status-left ' '
set -g status-right ' #H %H:%M '
