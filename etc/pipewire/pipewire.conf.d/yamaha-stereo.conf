# Expose a 2-channel stereo sink that loops into the first two AUX channels
# of the Steinberg UR816C multichannel output.
#
# Rationale: the UR816C only exposes a 10-channel "multichannel-output" PCM
# profile. Wine/Proton's winepulse driver does not understand 10-channel
# configurations and fails IAudioClient::Initialize with
#   err:pulse:pulse_spec_from_waveformat Invalid channel mask: 0/10
# This loopback presents a normal stereo sink that any application can use,
# while routing audio to physical outputs 1/2 on the interface.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "UR816C Stereo"
            capture.props = {
                node.name         = "ur816c_stereo"
                media.class       = "Audio/Sink"
                audio.position    = [ FL FR ]
            }
            playback.props = {
                node.name         = "ur816c_stereo_play"
                audio.position    = [ AUX0 AUX1 ]
                target.object     = "alsa_output.usb-Yamaha_Corporation_Steinberg_UR816C-00.multichannel-output"
                stream.dont-remix = true
                node.passive      = true
            }
        }
    }
]
